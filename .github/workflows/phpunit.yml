name: PHPUnit

on:
  pull_request:
    branches:
      - develop

jobs:
  main:
    name: Build and test

    strategy:
      matrix:
        php-versions: ['8.1', '8.3']

    runs-on: ubuntu-latest

    if: (! contains(github.event.head_commit.message, '[ci skip]'))

    # A app usa advisory locks e UPDATE...WHERE atômico específicos do Postgres
    # (PropertyService, PaymentService, CouponModel) — sem um Postgres real aqui,
    # esses caminhos de concorrência não são exercidos. Credenciais/porta abaixo
    # espelham exatamente o grupo database.tests.* de phpunit.xml.dist.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: habitaweb_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup PHP, with composer and extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          tools: composer, pecl, phpunit
          extensions: intl, json, mbstring, mysqlnd, pgsql, pdo_pgsql, xdebug, xml, sqlite3
          coverage: xdebug

      - name: Get composer cache directory
        id: composer-cache
        run: echo "::set-output name=dir::$(composer config cache-files-dir)"

      - name: Cache composer dependencies
        uses: actions/cache@v2
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-progress --no-interaction --prefer-dist --optimize-autoloader
        # To prevent rate limiting you may need to supply an OAuth token in Settings > Secrets
        # env:
          # https://getcomposer.org/doc/articles/troubleshooting.md#api-rate-limit-and-oauth-tokens
          # COMPOSER_AUTH: ${{ secrets.COMPOSER_AUTH }}

      # asaas-sandbox fica de fora do CI padrão: depende de credenciais externas
      # (Asaas sandbox) que não existem neste ambiente. Roda-se manualmente via
      # ./run_tests.sh sandbox com um .env.testing local.
      - name: Test with phpunit
        run: vendor/bin/phpunit --testsuite unit,feature,e2e --exclude-group asaas-sandbox --coverage-text
